<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIC — Case Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b25;
    --bg3: #1e2535;
    --bg4: #252d3d;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #556070;
    --accent: #4f8ef7;
    --accent2: #3a6fd8;
    --success: #34c77b;
    --warning: #f5a623;
    --purple: #9b72f5;
    --coral: #f06a6a;
    --radius: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 230px; min-width: 230px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600; margin-bottom: 10px;
  }
  .logo-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .nav { padding: 12px 10px; flex: 1; }
  .nav-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); padding: 10px 10px 5px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius);
    font-size: 13px; color: var(--text2);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; margin-bottom: 1px;
    transition: background .15s, color .15s;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--text); font-weight: 500; }
  .nav-item i { font-size: 14px; width: 16px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: rgba(79,142,247,.18); color: var(--accent);
    font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 20px;
  }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }

  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 12px; width: 240px;
  }
  .search-wrap i { color: var(--text3); font-size: 13px; }
  .search-wrap input {
    border: none; background: none; color: var(--text);
    font-size: 13px; font-family: var(--font); width: 100%;
    outline: none;
  }
  .search-wrap input::placeholder { color: var(--text3); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 13px; font-family: var(--font);
    cursor: pointer; transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg4); border-color: var(--border2); }
  .btn i { font-size: 13px; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── Metrics ── */
  .metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .metric {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 18px;
  }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .metric-sub { font-size: 12px; color: var(--text3); margin-top: 5px; }
  .metric-accent { color: var(--accent); }
  .metric-success { color: var(--success); }
  .metric-warning { color: var(--warning); }
  .metric-purple { color: var(--purple); }

  /* ── Section ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 600; }

  /* ── Table ── */
  .table-wrap {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 16px;
    font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
    color: var(--text3); font-weight: 600; background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  .td-name { font-weight: 500; font-size: 13px; }
  .td-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ── Pills / Badges ── */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap;
  }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .pill-lead { background: rgba(79,142,247,.15); color: #6ea8ff; }
  .pill-intake { background: rgba(245,166,35,.15); color: #f5a623; }
  .pill-signed { background: rgba(155,114,245,.15); color: #b494ff; }
  .pill-settlement { background: rgba(52,199,123,.15); color: #34c77b; }

  .type-badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 6px;
  }
  .type-auto { background: rgba(79,142,247,.12); color: #6ea8ff; }
  .type-slip { background: rgba(245,166,35,.12); color: #f5a623; }
  .type-work { background: rgba(155,114,245,.12); color: #b494ff; }
  .type-medical { background: rgba(52,199,123,.12); color: #34c77b; }
  .type-other { background: rgba(255,255,255,.08); color: var(--text2); }

  .view-btn {
    font-size: 12px; color: var(--accent); cursor: pointer;
    background: none; border: none; font-family: var(--font);
    padding: 4px 8px; border-radius: 6px;
    transition: background .15s;
  }
  .view-btn:hover { background: rgba(79,142,247,.12); }

  /* ── Filter chips ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); background: none;
    cursor: pointer; color: var(--text2); font-family: var(--font);
    transition: all .15s;
  }
  .chip:hover { background: var(--bg3); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  /* ── Pipeline ── */
  .pipeline { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .stage-col {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 14px; min-height: 300px;
  }
  .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .stage-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); }
  .stage-cnt {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; background: var(--bg3); color: var(--text2);
  }
  .kanban-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 12px;
    margin-bottom: 8px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .kanban-card:hover { border-color: var(--border2); background: var(--bg4); }
  .kanban-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .kanban-meta { font-size: 12px; color: var(--text3); }
  .empty-col { font-size: 12px; color: var(--text3); text-align: center; padding: 16px 0; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 200;
    align-items: flex-start; justify-content: center;
    padding: 48px 20px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); width: 100%; max-width: 560px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: none;
    color: var(--text2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 14px;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--bg3); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); }
  .field input, .field select, .field textarea {
    padding: 8px 11px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 13px; font-family: var(--font);
    outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--bg3); }
  .field textarea { resize: vertical; min-height: 72px; }

  /* ── Detail view ── */
  .detail-section { margin-bottom: 22px; }
  .detail-section h3 {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text3); margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .detail-item { background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; }
  .di-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .di-value { font-size: 13px; font-weight: 500; }

  /* ── Timeline ── */
  .timeline { padding-left: 18px; border-left: 2px solid var(--border2); margin-left: 6px; }
  .tl-item { position: relative; margin-bottom: 12px; }
  .tl-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg4); border: 2px solid var(--border2);
    position: absolute; left: -23px; top: 4px;
  }
  .tl-dot.active { background: var(--accent); border-color: var(--accent); }
  .tl-text { font-size: 13px; color: var(--text2); }

  /* ── Contract area ── */
  .contract-drop {
    border: 1.5px dashed var(--border2); border-radius: var(--radius);
    padding: 20px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .contract-drop:hover { border-color: var(--accent); background: rgba(79,142,247,.05); }
  .contract-drop i { font-size: 22px; color: var(--text3); margin-bottom: 6px; display: block; }
  .contract-drop p { font-size: 13px; color: var(--text3); }
  .contract-file {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border-radius: var(--radius);
    padding: 10px 12px; font-size: 13px;
  }
  .contract-file i { color: var(--success); }
  .contract-status { margin-left: auto; font-size: 12px; color: var(--success); font-weight: 500; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  /* ── Notification toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
    transform: translateY(80px); opacity: 0;
    transition: all .25s ease; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast i { color: var(--success); }

  /* ── Empty state ── */
  .empty-row td { text-align: center; color: var(--text3); padding: 32px 16px !important; font-size: 13px; }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">P</div>
      <div class="logo-name">Pinnacle Injury</div>
      <div class="logo-sub">Case Management</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Main</div>
      <button class="nav-item active" onclick="showView('dashboard')"><i class="fa-solid fa-table-columns"></i> Dashboard</button>
      <button class="nav-item" onclick="showView('pipeline')"><i class="fa-solid fa-bars-staggered"></i> Pipeline <span class="nav-badge" id="pipeline-badge">0</span></button>
      <button class="nav-item" onclick="showView('cases')"><i class="fa-solid fa-users"></i> All Cases</button>
      <div class="nav-section">Stages</div>
      <button class="nav-item" onclick="showView('leads')"><i class="fa-solid fa-bolt"></i> Leads</button>
      <button class="nav-item" onclick="showView('intakes')"><i class="fa-solid fa-clipboard-list"></i> Intakes</button>
      <button class="nav-item" onclick="showView('contracts')"><i class="fa-solid fa-file-signature"></i> Contracts</button>
      <button class="nav-item" onclick="showView('settlements')"><i class="fa-solid fa-circle-dollar-to-slot"></i> Settlements</button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="view-title">Dashboard</span>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search cases…" oninput="render()" />
      </div>
      <button class="btn btn-primary" onclick="openModal('new-case-modal')">
        <i class="fa-solid fa-plus"></i> New Case
      </button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- New Case Modal -->
<div class="modal-overlay" id="new-case-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Case</span>
      <button class="modal-close" onclick="closeModal('new-case-modal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>First name</label><input id="nc-first" type="text" placeholder="Maria" /></div>
        <div class="field"><label>Last name</label><input id="nc-last" type="text" placeholder="Santos" /></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Phone</label><input id="nc-phone" type="tel" placeholder="(713) 555-0100" /></div>
        <div class="field"><label>Email</label><input id="nc-email" type="email" placeholder="maria@email.com" /></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Case type</label>
          <select id="nc-type">
            <option>Auto Accident</option><option>Slip &amp; Fall</option>
            <option>Workplace Injury</option><option>Medical Malpractice</option><option>Other</option>
          </select>
        </div>
        <div class="field"><label>Lead source</label>
          <select id="nc-source">
            <option>Website</option><option>Digital Ad</option>
            <option>Referral</option><option>Walk-in</option><option>Social Media</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Incident date</label><input id="nc-date" type="date" /></div>
        <div class="field"><label>Assigned specialist</label>
          <select id="nc-specialist">
            <option>Jordan Lee</option><option>Priya Nair</option>
            <option>Marcus Hill</option><option>Unassigned</option>
          </select>
        </div>
      </div>
      <div class="form-grid full">
        <div class="field"><label>Notes</label><textarea id="nc-notes" placeholder="Brief description of incident…"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('new-case-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewCase()"><i class="fa-solid fa-check"></i> Create case</button>
    </div>
  </div>
</div>

<!-- Case Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">Case</span>
      <button class="modal-close" onclick="closeModal('detail-modal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('detail-modal')">Close</button>
      <button class="btn btn-primary" id="advance-btn" onclick="advanceStage()"><i class="fa-solid fa-arrow-right"></i> Advance stage</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toast-msg"></span></div>

<script>
const STAGES = ['Lead','Intake Completed','Case Signed','Settlement Closed'];
const PILL = { 'Lead':'pill-lead','Intake Completed':'pill-intake','Case Signed':'pill-signed','Settlement Closed':'pill-settlement' };
const TYPE_CLS = { 'Auto Accident':'type-auto','Slip & Fall':'type-slip','Workplace Injury':'type-work','Medical Malpractice':'type-medical','Other':'type-other' };

let cases = [], activeId = null, currentView = 'dashboard', activeFilter = 'All';

/* ── Storage ── */
function load() {
  try { const d = localStorage.getItem('pic-cases'); if(d) cases = JSON.parse(d); } catch(e) { cases = []; }
  if (!cases.length) seed();
  render();
}
function save() { try { localStorage.setItem('pic-cases', JSON.stringify(cases)); } catch(e) {} }

function seed() {
  const now = Date.now();
  cases = [
    {id:1,first:'Diana',last:'Torres',phone:'(713) 555-0141',email:'diana@email.com',type:'Auto Accident',source:'Digital Ad',stage:'Lead',specialist:'Jordan Lee',notes:'Rear-end collision on I-45. Client reports neck and back pain.',date:'2026-04-28',created:now-86400000*5,history:['2026-04-28 — Lead created'],contract:null},
    {id:2,first:'Marcus',last:'Webb',phone:'(832) 555-0198',email:'marcus@email.com',type:'Slip & Fall',source:'Website',stage:'Intake Completed',specialist:'Priya Nair',notes:'Fell at retail store, knee injury. Witnesses present.',date:'2026-04-10',created:now-86400000*12,history:['2026-04-10 — Lead created','2026-04-15 — Intake completed'],contract:null},
    {id:3,first:'Elena',last:'Kim',phone:'(281) 555-0067',email:'elena@email.com',type:'Workplace Injury',source:'Referral',stage:'Case Signed',specialist:'Marcus Hill',notes:'Back injury from warehouse lift. On workers comp.',date:'2026-03-22',created:now-86400000*25,history:['2026-03-22 — Lead created','2026-03-28 — Intake completed','2026-04-02 — Case signed'],contract:'Engagement_Contract_Kim.pdf'},
    {id:4,first:'James',last:'Okonkwo',phone:'(713) 555-0212',email:'james@email.com',type:'Auto Accident',source:'Walk-in',stage:'Settlement Closed',specialist:'Jordan Lee',notes:'T-bone collision, shoulder surgery required.',date:'2025-12-01',created:now-86400000*60,history:['2025-12-01 — Lead created','2025-12-08 — Intake completed','2025-12-15 — Case signed','2026-02-20 — Settlement closed'],contract:'Engagement_Contract_Okonkwo.pdf'},
    {id:5,first:'Sofia',last:'Reyes',phone:'(832) 555-0155',email:'sofia@email.com',type:'Medical Malpractice',source:'Social Media',stage:'Lead',specialist:'Priya Nair',notes:'Post-op complications following outpatient procedure.',date:'2026-05-01',created:now-86400000*2,history:['2026-05-01 — Lead created'],contract:null},
  ];
  save();
}

function nextId() { return cases.length ? Math.max(...cases.map(c=>c.id))+1 : 1; }
function today() { return new Date().toISOString().split('T')[0]; }

/* ── Nav ── */
function showView(v) { currentView = v; activeFilter = 'All'; render(); }

function render() {
  const active = cases.filter(c => c.stage !== 'Settlement Closed').length;
  document.getElementById('pipeline-badge').textContent = active;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') && el.getAttribute('onclick').includes("'"+currentView+"'"));
  });
  const titles = {dashboard:'Dashboard',pipeline:'Pipeline',cases:'All Cases',leads:'Leads',intakes:'Intakes',contracts:'Contracts',settlements:'Settlements'};
  document.getElementById('view-title').textContent = titles[currentView] || '';
  const el = document.getElementById('main-content');
  if (currentView === 'dashboard') el.innerHTML = renderDashboard();
  else if (currentView === 'pipeline') el.innerHTML = renderPipeline();
  else if (currentView === 'cases') el.innerHTML = renderTable('All');
  else if (currentView === 'leads') el.innerHTML = renderTable('Lead');
  else if (currentView === 'intakes') el.innerHTML = renderTable('Intake Completed');
  else if (currentView === 'contracts') el.innerHTML = renderTable('Case Signed');
  else if (currentView === 'settlements') el.innerHTML = renderTable('Settlement Closed');
}

/* ── Dashboard ── */
function renderDashboard() {
  const total = cases.length;
  const leads = cases.filter(c=>c.stage==='Lead').length;
  const signed = cases.filter(c=>c.stage==='Case Signed').length;
  const settled = cases.filter(c=>c.stage==='Settlement Closed').length;
  const recent = [...cases].sort((a,b)=>b.created-a.created).slice(0,6);
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total cases</div><div class="metric-value">${total}</div><div class="metric-sub">All time</div></div>
    <div class="metric"><div class="metric-label">Active leads</div><div class="metric-value metric-accent">${leads}</div><div class="metric-sub">Needs intake</div></div>
    <div class="metric"><div class="metric-label">Cases signed</div><div class="metric-value metric-purple">${signed}</div><div class="metric-sub">Pending settlement</div></div>
    <div class="metric"><div class="metric-label">Settlements closed</div><div class="metric-value metric-success">${settled}</div><div class="metric-sub">Completed</div></div>
  </div>
  <div class="section-header"><span class="section-title">Recent cases</span></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Client</th><th>Type</th><th>Stage</th><th>Specialist</th><th>Created</th><th></th></tr></thead>
      <tbody>${recent.map(c=>`
        <tr>
          <td><div class="td-name">${c.first} ${c.last}</div><div class="td-sub">${c.phone}</div></td>
          <td><span class="type-badge ${TYPE_CLS[c.type]||'type-other'}">${c.type}</span></td>
          <td><span class="pill ${PILL[c.stage]||'pill-lead'}"><span class="pill-dot"></span>${c.stage}</span></td>
          <td style="color:var(--text2);font-size:13px">${c.specialist}</td>
          <td style="color:var(--text3);font-size:12px">${new Date(c.created).toLocaleDateString()}</td>
          <td><button class="view-btn" onclick="openDetail(${c.id})">View →</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ── Pipeline ── */
function renderPipeline() {
  return `<div class="pipeline">${STAGES.map(stage => {
    const cols = cases.filter(c=>c.stage===stage);
    return `<div class="stage-col">
      <div class="stage-header">
        <span class="stage-label">${stage}</span>
        <span class="stage-cnt">${cols.length}</span>
      </div>
      ${cols.length === 0 ? '<div class="empty-col">No cases</div>' :
        cols.map(c=>`<div class="kanban-card" onclick="openDetail(${c.id})">
          <div class="kanban-name">${c.first} ${c.last}</div>
          <div class="kanban-meta" style="margin-bottom:6px">${c.specialist}</div>
          <span class="type-badge ${TYPE_CLS[c.type]||'type-other'}">${c.type}</span>
        </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

/* ── Table ── */
function renderTable(stageFilter) {
  const q = (document.getElementById('search-input')||{}).value||'';
  let rows = cases.filter(c => {
    const matchStage = stageFilter === 'All' || c.stage === stageFilter;
    const matchFilter = activeFilter === 'All' || c.stage === activeFilter;
    const matchQ = !q || (c.first+' '+c.last+c.type+c.specialist).toLowerCase().includes(q.toLowerCase());
    return matchStage && matchFilter && matchQ;
  });
  const chips = stageFilter === 'All' ? `<div class="filter-bar">
    ${['All',...STAGES].map(s=>`<button class="chip ${activeFilter===s?'active':''}" onclick="setFilter('${s}')">${s}</button>`).join('')}
  </div>` : '';
  return `${chips}<div class="table-wrap"><table>
    <thead><tr><th>Client</th><th>Type</th><th>Source</th><th>Stage</th><th>Specialist</th><th>Incident date</th><th>Contract</th><th></th></tr></thead>
    <tbody>${rows.length === 0 ? '<tr class="empty-row"><td colspan="8">No cases found</td></tr>' :
      rows.map(c=>`<tr>
        <td><div class="td-name">${c.first} ${c.last}</div><div class="td-sub">${c.email}</div></td>
        <td><span class="type-badge ${TYPE_CLS[c.type]||'type-other'}">${c.type}</span></td>
        <td style="color:var(--text3);font-size:12px">${c.source}</td>
        <td><span class="pill ${PILL[c.stage]||'pill-lead'}"><span class="pill-dot"></span>${c.stage}</span></td>
        <td style="color:var(--text2);font-size:13px">${c.specialist}</td>
        <td style="color:var(--text3);font-size:12px">${c.date||'—'}</td>
        <td style="font-size:12px">${c.contract
          ? `<span style="color:var(--success)"><i class="fa-solid fa-file-circle-check"></i> Attached</span>`
          : `<span style="color:var(--text3)">—</span>`}</td>
        <td><button class="view-btn" onclick="openDetail(${c.id})">View →</button></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function setFilter(f) { activeFilter = f; render(); }

/* ── New case ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function saveNewCase() {
  const first = document.getElementById('nc-first').value.trim();
  const last = document.getElementById('nc-last').value.trim();
  if (!first || !last) { alert('Please enter client name.'); return; }
  const c = {
    id: nextId(), first, last,
    phone: document.getElementById('nc-phone').value,
    email: document.getElementById('nc-email').value,
    type: document.getElementById('nc-type').value,
    source: document.getElementById('nc-source').value,
    stage: 'Lead',
    specialist: document.getElementById('nc-specialist').value,
    notes: document.getElementById('nc-notes').value,
    date: document.getElementById('nc-date').value,
    created: Date.now(),
    history: [today() + ' — Lead created'],
    contract: null
  };
  cases.unshift(c);
  save();
  closeModal('new-case-modal');
  ['nc-first','nc-last','nc-phone','nc-email','nc-notes','nc-date'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('nc-type').selectedIndex = 0;
  document.getElementById('nc-source').selectedIndex = 0;
  showToast('Case created successfully');
  render();
}

/* ── Detail ── */
function openDetail(id) {
  activeId = id;
  const c = cases.find(x=>x.id===id);
  if (!c) return;
  document.getElementById('detail-title').textContent = c.first + ' ' + c.last;
  const idx = STAGES.indexOf(c.stage);
  const canAdvance = idx < STAGES.length - 1;
  const advBtn = document.getElementById('advance-btn');
  advBtn.style.display = canAdvance ? '' : 'none';
  if (canAdvance) advBtn.innerHTML = `<i class="fa-solid fa-arrow-right"></i> Move to: ${STAGES[idx+1]}`;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <h3>Client information</h3>
      <div class="detail-grid">
        <div class="detail-item"><div class="di-label">Full name</div><div class="di-value">${c.first} ${c.last}</div></div>
        <div class="detail-item"><div class="di-label">Phone</div><div class="di-value">${c.phone||'—'}</div></div>
        <div class="detail-item"><div class="di-label">Email</div><div class="di-value" style="font-size:12px">${c.email||'—'}</div></div>
        <div class="detail-item"><div class="di-label">Incident date</div><div class="di-value">${c.date||'—'}</div></div>
        <div class="detail-item"><div class="di-label">Case type</div><div class="di-value"><span class="type-badge ${TYPE_CLS[c.type]||'type-other'}">${c.type}</span></div></div>
        <div class="detail-item"><div class="di-label">Lead source</div><div class="di-value">${c.source}</div></div>
        <div class="detail-item"><div class="di-label">Specialist</div><div class="di-value">${c.specialist}</div></div>
        <div class="detail-item"><div class="di-label">Current stage</div><div class="di-value"><span class="pill ${PILL[c.stage]||'pill-lead'}"><span class="pill-dot"></span>${c.stage}</span></div></div>
      </div>
    </div>
    ${c.notes ? `<div class="detail-section"><h3>Case notes</h3><p style="font-size:13px;color:var(--text2);line-height:1.7">${c.notes}</p></div>` : ''}
    <div class="detail-section">
      <h3>Case timeline</h3>
      <div class="timeline">
        ${c.history.map((h,i)=>`<div class="tl-item"><div class="tl-dot ${i===c.history.length-1?'active':''}"></div><div class="tl-text">${h}</div></div>`).join('')}
      </div>
    </div>
    <div class="detail-section">
      <h3>Engagement contract</h3>
      ${c.contract
        ? `<div class="contract-file"><i class="fa-solid fa-file-pdf"></i> ${c.contract}<span class="contract-status"><i class="fa-solid fa-circle-check"></i> Attached</span></div>`
        : `<div class="contract-drop" onclick="attachContract(${c.id})"><i class="fa-solid fa-cloud-arrow-up"></i><p>Click to attach engagement contract</p><p style="font-size:11px;margin-top:3px;color:var(--text3)">PDF or DOC</p></div>`}
    </div>`;
  openModal('detail-modal');
}

function attachContract(id) {
  const c = cases.find(x=>x.id===id);
  if (!c) return;
  const name = prompt('Enter contract filename (e.g. Engagement_Contract_Smith.pdf):');
  if (!name) return;
  c.contract = name.trim();
  c.history.push(today() + ' — Engagement contract attached');
  save();
  showToast('Contract attached');
  openDetail(id);
}

function advanceStage() {
  const c = cases.find(x=>x.id===activeId);
  if (!c) return;
  const idx = STAGES.indexOf(c.stage);
  if (idx < STAGES.length - 1) {
    c.stage = STAGES[idx+1];
    c.history.push(today() + ' — Advanced to: ' + c.stage);
    save();
    showToast('Case moved to ' + c.stage);
    render();
    openDetail(activeId);
  }
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* Close modal on overlay click */
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

load();
</script>
</body>
</html>
